aid: ocean-network-express
name: Ocean Network Express
description: >-
  Ocean Network Express (ONE) is a Singapore-headquartered global container
  liner shipping company formed in 2017 through the integration of the
  container shipping businesses of three Japanese carriers — Nippon Yusen
  Kaisha (NYK), Mitsui O.S.K. Lines (MOL), and Kawasaki Kisen Kaisha (K-Line)
  — with commercial operations launching on 1 April 2018. Operating under
  the magenta "ONE" brand and the Standard Carrier Alpha Code ONEY, the
  company runs a fleet exceeding 2,200,000 TEU across 165+ weekly service
  loops calling at 244+ ports worldwide, making it one of the largest ocean
  container carriers globally. ONE participates in THE Alliance vessel
  sharing agreement and offers reefer, dangerous goods, out-of-gauge, and
  project cargo services alongside standard dry container moves. Its
  customer-facing digital surface centers on the ONE eCommerce platform
  (ecomm.one-line.com), which provides cargo tracking, instant quotation
  via ONE QUOTE (powered by Descartes Kontainers), spot booking, shipping
  instructions, electronic bill of lading, ePayment, and demurrage/detention
  inquiry. A partner-facing developer portal exists at developers.one-line.com
  alongside EDI integration channels, but ONE does not publish a fully open,
  self-service OpenAPI specification, public SDK, or open-source code at
  either the github.com/ocean-network-express or github.com/OceanNetworkExpress
  organizations (both exist with zero public repositories). Tracking,
  booking, and schedule integrations are most commonly accessed by shippers
  and BCOs through third-party aggregators (Vizion, Portcast, JSONCargo,
  Terminal49, Tradlinx) or via DCSA-conformant carrier APIs delivered under
  commercial agreement.
